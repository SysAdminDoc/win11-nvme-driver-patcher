# wrangler.toml — sample config for the NVMe Driver Patcher compat-telemetry receiver.
# Replace <account-id>, <KV-namespace-id>, and the SALT secret before deploying.

name = "nvme-driver-patcher-compat"
main = "cloudflare-worker.js"
compatibility_date = "2026-04-19"

account_id = "<account-id>"

[vars]
# No vars required for the default deployment. `env.SALT` (below) rotates the anonId hash —
# set it via `wrangler secret put SALT`.

kv_namespaces = [
  { binding = "COMPAT", id = "<KV-namespace-id>" }
]

# Optional but recommended: Cloudflare's Workers Rate Limiting binding. When present as
# `RATE_LIMITER`, the worker uses it (atomic, no check-then-write race) instead of the
# best-effort KV counter fallback. `simple` period must be 10 or 60 seconds.
# [[unsafe.bindings]]
# name = "RATE_LIMITER"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { limit = 10, period = 60 }
