name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v4.0.0)'
        required: true

permissions:
  contents: write

# Don't let two release runs for the same tag race each other (e.g. tag-push + manual dispatch).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          # Resolves the SDK from global.json (exact pin + rollForward policy) so the
          # release toolchain always matches CI and local builds.
          global-json-file: global.json

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          # Strip optional leading "v" so the version comparison stays consistent with AppConfig.AppVersion.
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate version consistency (tag must match repo metadata)
        shell: pwsh
        run: ./scripts/Validate-ReleaseVersions.ps1 -ReleaseVersion '${{ steps.tag.outputs.version }}'

      - name: Restore
        run: dotnet restore NVMeDriverPatcher.sln

      - name: Test
        run: dotnet test NVMeDriverPatcher.sln -c Release --no-restore --verbosity normal

      - name: Build GUI (self-contained single file)
        run: dotnet publish src/NVMeDriverPatcher -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:Version=${{ steps.tag.outputs.version }} -p:AssemblyVersion=${{ steps.tag.outputs.version }}.0 -p:FileVersion=${{ steps.tag.outputs.version }}.0 -o publish/gui

      - name: Build CLI (self-contained single file)
        run: dotnet publish src/NVMeDriverPatcher.Cli -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:Version=${{ steps.tag.outputs.version }} -p:AssemblyVersion=${{ steps.tag.outputs.version }}.0 -p:FileVersion=${{ steps.tag.outputs.version }}.0 -o publish/cli

      - name: Build Tray (non-admin status agent)
        run: dotnet publish src/NVMeDriverPatcher.Tray -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:Version=${{ steps.tag.outputs.version }} -p:AssemblyVersion=${{ steps.tag.outputs.version }}.0 -p:FileVersion=${{ steps.tag.outputs.version }}.0 -o publish/tray

      - name: Build Watchdog (real-time service)
        run: dotnet publish src/NVMeDriverPatcher.Watchdog -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:Version=${{ steps.tag.outputs.version }} -p:AssemblyVersion=${{ steps.tag.outputs.version }}.0 -p:FileVersion=${{ steps.tag.outputs.version }}.0 -o publish/watchdog

      - name: Stage MSI inputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish/msi-staging | Out-Null
          Copy-Item publish/gui/NVMeDriverPatcher.exe              publish/msi-staging/ -Force
          Copy-Item publish/cli/NVMeDriverPatcher.Cli.exe          publish/msi-staging/ -Force
          Copy-Item publish/tray/NVMeDriverPatcher.Tray.exe        publish/msi-staging/ -Force
          Copy-Item publish/watchdog/NVMeDriverPatcher.Watchdog.exe publish/msi-staging/ -Force
          Copy-Item src/NVMeDriverPatcher/compat.json              publish/msi-staging/ -Force
          Copy-Item src/NVMeDriverPatcher/windows_build_rules.json publish/msi-staging/ -Force
          # The tracked icon asset lives in the GUI project; the wxs expects icon.ico in PublishDir.
          Copy-Item src/NVMeDriverPatcher/nvme.ico                 publish/msi-staging/icon.ico -Force

      - name: Install WiX (pinned)
        shell: pwsh
        run: |
          # Pinned: WiX 7.x requires Open Source Maintenance Fee EULA acceptance
          # (error WIX7015) — unpinned install broke the v5.0.0 release run. 5.0.2
          # compiles our v4-schema authoring without the OSMF gate.
          dotnet tool install --global wix --version 5.0.2 2>$null
          wix --version
          wix extension add WixToolset.UI.wixext/5.0.2
          wix extension add WixToolset.Util.wixext/5.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          wix build packaging/wix/NVMeDriverPatcher.wxs `
            -d PublishDir="${{ github.workspace }}/publish/msi-staging" `
            -d ProjectRoot="${{ github.workspace }}" `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -out publish/NVMeDriverPatcher-${{ steps.tag.outputs.version }}.msi
        # MSI is a REQUIRED artifact (Intune/SCCM detection depends on it) — a WiX failure
        # fails the release here, not at upload time.

      - name: Authenticode sign (if secret present)
        # No-op unless the caller configured the CODE_SIGN_PFX_BASE64 + CODE_SIGN_PFX_PASSWORD
        # secrets. This keeps the release path unblocked when the project is unsigned — a
        # signed build simply becomes available the moment secrets are configured.
        if: ${{ env.CODE_SIGN_PFX_BASE64 != '' }}
        env:
          CODE_SIGN_PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
          CODE_SIGN_PFX_PASSWORD: ${{ secrets.CODE_SIGN_PFX_PASSWORD }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODE_SIGN_PFX_BASE64))
          $targets = @(
            'publish/gui/NVMeDriverPatcher.exe',
            'publish/cli/NVMeDriverPatcher.Cli.exe',
            'publish/tray/NVMeDriverPatcher.Tray.exe',
            'publish/watchdog/NVMeDriverPatcher.Watchdog.exe',
            "publish/NVMeDriverPatcher-${{ steps.tag.outputs.version }}.msi"
          )
          foreach ($file in $targets) {
            if (Test-Path $file) {
              & signtool.exe sign `
                /f $pfxPath /p $env:CODE_SIGN_PFX_PASSWORD `
                /tr http://timestamp.sectigo.com /td sha256 /fd sha256 `
                $file
              if ($LASTEXITCODE -ne 0) { throw "signtool failed on $file" }
            }
          }
          Remove-Item $pfxPath -Force

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          # Two outputs here serve different consumers:
          #   * publish/SHA256SUMS.txt  — the combined sha256sum manifest humans copy-paste.
          #   * publish/<asset>.sha256  — per-asset sidecars. The in-app auto-updater
          #     (AutoUpdaterService) fetches "<asset>.sha256" alongside each download and
          #     refuses to stage the binary if the sidecar is missing or mismatched. Without
          #     these files, the auto-updater falls back to Authenticode, and if the build
          #     isn't signed, updates fail closed. Emitting both keeps every release verifiable.
          $files = @(
            'publish/gui/NVMeDriverPatcher.exe',
            'publish/cli/NVMeDriverPatcher.Cli.exe',
            'publish/tray/NVMeDriverPatcher.Tray.exe',
            'publish/watchdog/NVMeDriverPatcher.Watchdog.exe',
            "publish/NVMeDriverPatcher-${{ steps.tag.outputs.version }}.msi",
            'NVMe_Driver_Patcher.ps1'
          )
          $lines = foreach ($f in $files) {
            if (Test-Path $f) {
              $hash = (Get-FileHash -Algorithm SHA256 -Path $f).Hash.ToLower()
              $name = Split-Path $f -Leaf
              # Per-asset sidecar in publish/ so the upload step can pick it up by a simple
              # glob; the body matches the sha256sum format ("<hash>  <name>") that
              # AutoUpdaterService.ExtractSha256 already parses.
              $sidecarPath = "publish/$name.sha256"
              "$hash  $name" | Out-File -FilePath $sidecarPath -Encoding ascii -NoNewline
              "$hash  $name"
            }
          }
          $lines | Out-File -FilePath 'publish/SHA256SUMS.txt' -Encoding ascii

      - name: Compute winget InstallerSha256 for GUI exe
        id: winget
        shell: pwsh
        run: |
          $sha = (Get-FileHash -Algorithm SHA256 -Path 'publish/gui/NVMeDriverPatcher.exe').Hash.ToUpper()
          "sha256=$sha" >> $env:GITHUB_OUTPUT

      - name: Emit winget manifest with real SHA256
        shell: pwsh
        run: |
          $yaml = Get-Content -Raw packaging/winget/SysAdminDoc.NVMeDriverPatcher.yaml
          $yaml = $yaml -replace 'REPLACE_ME_WITH_RELEASE_SHA256', '${{ steps.winget.outputs.sha256 }}'
          $yaml = $yaml -replace 'PackageVersion:.*', ('PackageVersion: ' + '${{ steps.tag.outputs.version }}')
          # Rewrite the tag segment of InstallerUrl too — version/hash replacement alone
          # previously paired a new hash with a stale download URL.
          $yaml = $yaml -replace '/releases/download/v[0-9][^/]*/', ('/releases/download/' + '${{ steps.tag.outputs.tag }}' + '/')
          $yaml | Out-File -FilePath 'publish/SysAdminDoc.NVMeDriverPatcher.yaml' -Encoding utf8

      - name: Package PowerShell module zip
        shell: pwsh
        run: |
          $moduleDir = 'publish/powershell-module'
          New-Item -ItemType Directory -Force -Path $moduleDir | Out-Null
          Copy-Item packaging/powershell/NVMeDriverPatcher.psd1 $moduleDir/ -Force
          Copy-Item packaging/powershell/NVMeDriverPatcher.psm1 $moduleDir/ -Force
          Copy-Item publish/cli/NVMeDriverPatcher.Cli.exe       $moduleDir/ -Force
          Copy-Item LICENSE                                      $moduleDir/ -Force
          Compress-Archive -Path "$moduleDir/*" `
            -DestinationPath "publish/NVMeDriverPatcher.PowerShell-${{ steps.tag.outputs.version }}.zip" `
            -Force
          $hash = (Get-FileHash -Algorithm SHA256 "publish/NVMeDriverPatcher.PowerShell-${{ steps.tag.outputs.version }}.zip").Hash.ToLower()
          $name = "NVMeDriverPatcher.PowerShell-${{ steps.tag.outputs.version }}.zip"
          "$hash  $name" | Out-File -FilePath "publish/$name.sha256" -Encoding ascii -NoNewline
          "$hash  $name" | Out-File -FilePath 'publish/SHA256SUMS.txt' -Encoding ascii -Append

      - name: Validate release artifact contract
        shell: pwsh
        run: ./scripts/Validate-ReleaseAssets.ps1 -Version '${{ steps.tag.outputs.version }}'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "NVMe Driver Patcher ${{ steps.tag.outputs.tag }}"
          body: |
            ## NVMe Driver Patcher ${{ steps.tag.outputs.tag }}

            ### Downloads
            - **NVMeDriverPatcher.exe** — Compiled GUI application (run as Administrator)
            - **NVMeDriverPatcher.Cli.exe** — Command-line interface
            - **NVMeDriverPatcher.Tray.exe** — Non-admin status tray agent
            - **NVMeDriverPatcher.Watchdog.exe** — Optional real-time watchdog service (`NVMeDriverPatcher.Watchdog.exe /install` as admin, or select the feature in the MSI)
            - **NVMeDriverPatcher-*.msi** — Per-machine installer (GUI + CLI + tray; watchdog service selectable via `ADDLOCAL=WatchdogService`)
            - **NVMeDriverPatcher.PowerShell-*.zip** — PowerShell module with bundled CLI binary
            - **SysAdminDoc.NVMeDriverPatcher.yaml** — winget manifest for this release
            - **NVMe_Driver_Patcher.ps1** — PowerShell script (legacy)
            - **SHA256SUMS.txt** + per-asset `.sha256` sidecars — Verify downloads with `Get-FileHash <file> -Algorithm SHA256`

            ### Quick Start (GUI)
            Download `NVMeDriverPatcher.exe` and run. Administrator elevation is automatic.

            ### Quick Start (CLI)
            ```
            NVMeDriverPatcher.Cli.exe status
            NVMeDriverPatcher.Cli.exe apply
            NVMeDriverPatcher.Cli.exe remove
            NVMeDriverPatcher.Cli.exe version
            ```

            ### PowerShell (legacy)
            ```powershell
            irm https://github.com/SysAdminDoc/win11-nvme-driver-patcher/releases/latest/download/NVMe_Driver_Patcher.ps1 -OutFile NVMe_Driver_Patcher.ps1; .\NVMe_Driver_Patcher.ps1
            ```
          files: |
            publish/gui/NVMeDriverPatcher.exe
            publish/cli/NVMeDriverPatcher.Cli.exe
            publish/tray/NVMeDriverPatcher.Tray.exe
            publish/watchdog/NVMeDriverPatcher.Watchdog.exe
            publish/NVMeDriverPatcher-${{ steps.tag.outputs.version }}.msi
            publish/SHA256SUMS.txt
            publish/*.sha256
            publish/SysAdminDoc.NVMeDriverPatcher.yaml
            publish/NVMeDriverPatcher.PowerShell-${{ steps.tag.outputs.version }}.zip
            NVMe_Driver_Patcher.ps1
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
