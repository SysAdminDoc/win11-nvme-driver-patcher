name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One in-flight CI run per ref — cancel the older one when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore NVMeDriverPatcher.sln

      - name: Build (Debug)
        run: dotnet build NVMeDriverPatcher.sln -c Debug --no-restore --verbosity normal

      - name: Test (all fixtures)
        run: dotnet test NVMeDriverPatcher.sln -c Debug --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          retention-days: 14

      - name: Release-mode compile (smoke test — no publish)
        run: dotnet build NVMeDriverPatcher.sln -c Release --no-restore
