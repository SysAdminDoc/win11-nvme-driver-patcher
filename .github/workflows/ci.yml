name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One in-flight CI run per ref — cancel the older one when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          # Resolves the SDK from global.json (exact pin + rollForward policy) so CI and
          # local builds can never silently diverge on SDK major version again.
          global-json-file: global.json

      - name: Validate version consistency
        shell: pwsh
        run: ./scripts/Validate-ReleaseVersions.ps1

      - name: Restore
        run: dotnet restore NVMeDriverPatcher.sln

      - name: Fail on known-vulnerable packages
        shell: pwsh
        run: |
          $out = dotnet list NVMeDriverPatcher.sln package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $out
          if ($out -match '>\s') {
            Write-Host "Vulnerable package(s) detected — failing." -ForegroundColor Red
            exit 1
          }

      - name: Build (Debug)
        run: dotnet build NVMeDriverPatcher.sln -c Debug --no-restore --verbosity normal

      - name: Test (all fixtures)
        run: dotnet test NVMeDriverPatcher.sln -c Debug --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          retention-days: 14

      - name: Release-mode compile (smoke test — no publish)
        run: dotnet build NVMeDriverPatcher.sln -c Release --no-restore
